<!DOCTYPE html>
<html>
  <head><meta charset="utf-8" /><title>Account activated</title></head>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1f1f1f; max-width: 560px; margin: 0 auto; padding: 24px;">
    <h1 style="font-size: 22px; font-weight: 600;">Hi {{ user.first_name }},</h1>
    <p>
      your account{% if tenant_name %} at <strong>{{ tenant_name }}</strong>{% endif %}
      is now active.
    </p>
    {% if portal_url %}
      <p>
        You can sign in at
        <a href="{{ portal_url }}" style="color: #1f6feb;">{{ portal_url }}</a>.
      </p>
    {% endif %}
    <p style="color: #666; font-size: 12px; margin-top: 32px;">
      — The {{ tenant_name }} team
    </p>
  </body>
</html>
