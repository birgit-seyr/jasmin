<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Your verification code</title>
  </head>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #1f1f1f; max-width: 560px; margin: 0 auto; padding: 24px;">
    <h1 style="font-size: 22px; font-weight: 600; margin-bottom: 16px;">
      Hello{% if first_name %} {{ first_name }}{% endif %},
    </h1>

    <p>
      thanks for your interest in <strong>{{ tenant_name }}</strong>.
      Enter the following code to confirm your email address and continue
      your registration:
    </p>

    <p style="margin: 32px 0; text-align: center;">
      <span style="display: inline-block; padding: 12px 24px; background: #f2f5f3; color: #1d603e; font-size: 30px; letter-spacing: 6px; font-weight: 700; border-radius: 6px;">
        {{ code }}
      </span>
    </p>

    <p style="color: #777; font-size: 13px; margin-top: 32px;">
      The code is valid for 15 minutes.
      If you weren't expecting this email, you can simply ignore it.
    </p>
  </body>
</html>
