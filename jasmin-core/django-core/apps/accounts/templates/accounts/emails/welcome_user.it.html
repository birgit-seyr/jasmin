<!DOCTYPE html>
<html>
  <head><meta charset="utf-8" /><title>Account attivato</title></head>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1f1f1f; max-width: 560px; margin: 0 auto; padding: 24px;">
    <h1 style="font-size: 22px; font-weight: 600;">Ciao {{ user.first_name }},</h1>
    <p>
      il tuo account{% if tenant_name %} presso <strong>{{ tenant_name }}</strong>{% endif %}
      è ora attivo.
    </p>
    {% if portal_url %}
      <p>
        Da ora puoi accedere su
        <a href="{{ portal_url }}" style="color: #1f6feb;">{{ portal_url }}</a>.
      </p>
    {% endif %}
    <p style="color: #666; font-size: 12px; margin-top: 32px;">
      — Il team di {{ tenant_name }}
    </p>
  </body>
</html>
