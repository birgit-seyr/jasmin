<!DOCTYPE html>
<html>
  <head><meta charset="utf-8" /><title>Konto aktiviert</title></head>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1f1f1f; max-width: 560px; margin: 0 auto; padding: 24px;">
    <h1 style="font-size: 22px; font-weight: 600;">Hallo {{ user.first_name }},</h1>
    <p>
      dein Konto{% if tenant_name %} bei <strong>{{ tenant_name }}</strong>{% endif %}
      ist jetzt aktiv.
    </p>
    {% if portal_url %}
      <p>
        Du kannst dich ab sofort
        <a href="{{ portal_url }}" style="color: #1f6feb;">{{ portal_url }}</a> einloggen.
      </p>
    {% endif %}
    <p style="color: #666; font-size: 12px; margin-top: 32px;">
      — Das Team von {{ tenant_name }}
    </p>
  </body>
</html>
