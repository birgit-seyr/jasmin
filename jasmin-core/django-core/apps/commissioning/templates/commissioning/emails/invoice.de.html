<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Rechnung {{ invoice.number }}</title>
  </head>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #1f1f1f; max-width: 640px; margin: 0 auto; padding: 24px;">
    <h1 style="font-size: 22px; font-weight: 600;">Rechnung {{ invoice.number }}</h1>

    <p>Hallo {{ reseller.name }},</p>

    <p>anbei findest du deine Rechnung für {{ invoice.period }}.</p>

    <p>
      Gesamtbetrag: <strong>{{ invoice.total }}</strong><br />
      Fällig bis: {{ invoice.due_date }}
    </p>

    <p>Bankverbindung: {{ tenant.bank_details }}</p>

    <p style="color: #777; font-size: 13px; margin-top: 32px;">— Das Team von {{ tenant_name }}</p>
  </body>
</html>
