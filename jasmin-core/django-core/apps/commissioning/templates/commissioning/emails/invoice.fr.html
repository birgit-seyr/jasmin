<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Facture {{ invoice.number }}</title>
  </head>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #1f1f1f; max-width: 640px; margin: 0 auto; padding: 24px;">
    <h1 style="font-size: 22px; font-weight: 600;">Facture {{ invoice.number }}</h1>

    <p>Bonjour {{ reseller.name }},</p>

    <p>veuillez trouver ci-joint votre facture pour {{ invoice.period }}.</p>

    <p>
      Montant total : <strong>{{ invoice.total }}</strong><br />
      Échéance : {{ invoice.due_date }}
    </p>

    <p>Coordonnées bancaires : {{ tenant.bank_details }}</p>

    <p style="color: #777; font-size: 13px; margin-top: 32px;">— L'équipe de {{ tenant_name }}</p>
  </body>
</html>
