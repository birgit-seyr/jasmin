<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Payment reminder — {{ tenant_name }}</title>
  </head>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #1f1f1f; max-width: 640px; margin: 0 auto; padding: 24px;">
    <h1 style="font-size: 22px; font-weight: 600;">Payment reminder</h1>

    <p>Hi {{ reseller.name }},</p>

    <p>Our records show that the following invoices are still open:</p>

    <table style="border-collapse: collapse; width: 100%; margin-bottom: 16px;">
      <thead>
        <tr style="background: #f5f5f5; text-align: left;">
          <th style="padding: 8px; border: 1px solid #ddd;">Invoice</th>
          <th style="padding: 8px; border: 1px solid #ddd;">Total</th>
          <th style="padding: 8px; border: 1px solid #ddd;">Issued</th>
          <th style="padding: 8px; border: 1px solid #ddd;">Due</th>
          <th style="padding: 8px; border: 1px solid #ddd;">Overdue</th>
        </tr>
      </thead>
      <tbody>
        {{ invoices_table }}
      </tbody>
    </table>

    <p>If you have already paid, please disregard this message.</p>

    <p>Bank details: {{ tenant.bank_details }}</p>

    <p style="color: #777; font-size: 13px; margin-top: 32px;">— The {{ tenant_name }} team</p>
  </body>
</html>
