# Internal nginx config for the production frontend container.
# Only serves the static SPA. The outer gateway handles TLS, /api, /admin,
# /static, /media routing.
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-term cache for fingerprinted assets
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Service worker / manifest must NOT be cached by intermediaries
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        # CFG-6: self-serve baseline security headers so the SPA document isn't
        # bare if reached directly (not via the gateway). nginx add_header is
        # all-or-nothing per location, so these must live INSIDE location / next
        # to the Cache-Control above, not at server level. CSP + HSTS are left to
        # the gateway (single owner) to avoid duplicate/conflicting headers.
        add_header X-Content-Type-Options     "nosniff"        always;
        add_header X-Frame-Options            "SAMEORIGIN"     always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin"    always;
        add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
    }
}
