          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
        rabatt:
          type: integer
          maximum: 100
          minimum: 0
          nullable: true
        note:
          type: string
          nullable: true
          maxLength: 500
      required:
