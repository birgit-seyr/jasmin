  /api/commissioning/documentation_overview/:
    get:
      operationId: commissioning_documentation_overview_list
      description: "\n        Aggregates documentation data (harvest, purchase, or
        waste) by share article.\n        \n        Returns sum of amounts grouped
        by:\n        - Share article name\n        - Unit (kg, pieces, etc.)\n        -
        Size specification\n        \n        Can be filtered by year, week, and day_number.\n
        \       "
      summary: Documentation Aggregation Overview
      parameters:
      - in: query
        name: delivery_day
        schema:
          type: string
        description: sharesdeliveryday ID (Jasmin ID format)
      - in: query
        name: delivery_week
        schema:
          type: integer
        description: ISO week number (1-53)
        examples:
          Week1:
            value: 1
            summary: Week 1
          Week26:
            value: 26
            summary: Week 26
          Week52:
            value: 52
            summary: Week 52
      - in: query
        name: share_article
        schema:
          type: string
        description: Share article ID (Jasmin ID format)
        required: true
      - in: query
        name: source
        schema:
          type: string
          enum:
          - HARVEST
          - PURCHASE
          - WASTE
        description: Documentation source type (defaults to HARVEST)
      - in: query
        name: year
        schema:
          type: integer
        description: Year (YYYY format)
        required: true
        examples:
          '2024':
            value: 2024
          '2025':
            value: 2025
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentationAggregationItem'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/commissioning/documentation_summary/add_additional_theoretical_amount/:
    post:
      operationId: commissioning_documentation_summary_add_additional_theoretical_amount_create
      description: Add an additional theoretical amount for any documentation model.
      tags:
      - commissioning
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                  enum:
                  - harvest
                  - purchase
                  - washamount
                  - cleanamount
                  description: Documentation model the row belongs to.
              required:
              - model
              additionalProperties: {}
      security:
      - tenantBoundJwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentationSummaryRow'
          description: 'The freshly written row echoed in documentation-summary shape
            (see the summary action). May be ``{}`` when the row no longer matches
            the summary filters. Note: two seeded harvest storages add dynamic ``storage_<id>``
            boolean keys not listed here.'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/commissioning/documentation_summary/summary/:
    get:
      operationId: commissioning_documentation_summary_summary_retrieve
      description: Get documentation summary grouped by share article, unit, and size.
      parameters:
      - in: query
        name: day_number
        schema:
          type: integer
        description: Day of the week (0=Monday, 6=Sunday)
        examples:
          Monday:
            value: 0
          Wednesday:
            value: 2
          Sunday:
            value: 6
      - in: query
        name: delivery_week
        schema:
          type: integer
        description: ISO week number (1-53)
        required: true
        examples:
          Week1:
            value: 1
            summary: Week 1
          Week26:
            value: 26
            summary: Week 26
          Week52:
            value: 52
            summary: Week 52
      - in: query
        name: include_next_week
        schema:
          type: boolean
        description: Include data from the following week
      - in: query
        name: is_past
        schema:
          type: boolean
          default: false
        description: When true, includes archived/historical data. When false (default),
          only recent data is returned.
      - in: query
        name: is_preparation_lists
        schema:
          type: boolean
        description: Filter by short-term storage (preparation lists)
      - in: query
        name: model
        schema:
          type: string
          enum:
          - cleanamount
          - harvest
          - purchase
          - washamount
        description: Data model type
        required: true
      - in: query
        name: seller
        schema:
          type: string
        description: Seller ID (Jasmin ID format)
      - in: query
        name: year
        schema:
          type: integer
        description: Year (YYYY format)
        required: true
        examples:
          '2024':
            value: 2024
          '2025':
            value: 2025
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentationSummaryRow'
          description: Summary rows in documentation-summary shape. Per-model amount
            keys are prefixed with the requested model; two seeded harvest storages
            add dynamic ``storage_<id>`` boolean keys not listed in the schema.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
