          format: double
          nullable: true
        theoretical_purchase_amount:
          type: number
          format: double
          nullable: true
        theoretical_washamount_amount:
          type: number
          format: double
          nullable: true
        theoretical_cleanamount_amount:
          type: number
          format: double
          nullable: true
        additional_theoretical_harvest_amount:
