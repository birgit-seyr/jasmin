  /api/commissioning/member_growth_statistics/:
    get:
      operationId: commissioning_member_growth_statistics_list
      description: "\n    Returns member growth statistics over time, showing new
        members per period\n    and cumulative total. Can be filtered by time period
        and date range.\n    "
      summary: Get member growth statistics
      parameters:
      - in: query
        name: period
        schema:
          type: string
          enum:
          - month
          - week
          - year
          default: month
        description: Time period for grouping statistics
      - in: query
        name: start_date
        schema:
          type: string
          format: date
        description: 'Optional: Start date filter (YYYY-MM-DD). Ignored if ''year''
          is provided.'
      - in: query
        name: year
        schema:
          type: integer
        description: Year (YYYY format)
        examples:
          '2024':
            value: 2024
          '2025':
            value: 2025
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MemberGrowthStatistic'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
