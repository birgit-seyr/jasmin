  /api/commissioning/shares/bulk_update/:
    put:
      operationId: commissioning_shares_bulk_update_update
      description: Bulk update day-level fields on shares for a given week. If harvesting/packing/washing/cleaning_day
        changes, the linked theoretical objects and movements are recreated.
      parameters:
      - in: query
        name: day_number
        schema:
          type: integer
        description: Day of the week (0=Monday, 6=Sunday)
        examples:
          Monday:
            value: 0
          Wednesday:
            value: 2
          Sunday:
            value: 6
      - in: query
        name: delivery_week
        schema:
          type: integer
        description: ISO week number (1-53)
        required: true
        examples:
          Week1:
            value: 1
            summary: Week 1
          Week26:
            value: 26
            summary: Week 26
          Week52:
            value: 52
            summary: Week 52
      - in: query
        name: force
        schema:
          type: boolean
        description: Apply the change even when the week is in the past.
      - in: query
        name: year
        schema:
          type: integer
        description: Year (YYYY format)
        required: true
        examples:
          '2024':
            value: 2024
          '2025':
            value: 2025
      tags:
      - commissioning
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareBulkDayUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ShareBulkDayUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ShareBulkDayUpdateRequest'
      security:
      - tenantBoundJwtAuth: []
      responses:
