    get:
      operationId: commissioning_delivery_station_tours_overview_retrieve
      description: "\n        Provides an overview of all delivery stations with share
        counts,\n        organized by tours and stations.\n        \n        The response
        includes:\n        - List of tours with their stations\n\n        - For each
        station: number of shares by type-variation\n        - Metadata about available
        share-type variations\n        "
      summary: Delivery Stations and Tours Overview
      parameters:
      - in: query
        name: day_number
        schema:
          type: integer
        description: Day of the week (0=Monday, 6=Sunday)
        required: true
        examples:
          Monday:
            value: 0
          Wednesday:
            value: 2
          Sunday:
            value: 6
      - in: query
        name: delivery_week
        schema:
          type: integer
        description: ISO week number (1-53)
        required: true
        examples:
          Week1:
            value: 1
            summary: Week 1
          Week26:
            value: 26
            summary: Week 26
          Week52:
            value: 52
            summary: Week 52
      - in: query
        name: year
        schema:
          type: integer
        description: Year (YYYY format)
        required: true
        examples:
          '2024':
            value: 2024
          '2025':
            value: 2025
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryStationsToursOverviewResponse'
          description: ''
        '400':
