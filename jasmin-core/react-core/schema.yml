  /api/commissioning/my_membership/cancel/:
    post:
      operationId: commissioning_my_membership_cancel_create
      description: |-
        Member self-service membership cancellation.

        The member cancels THEIR OWN membership — resolved from
        ``request.user.member_profile`` (same ownership-link convention as
        :class:`MyMemberDataView`), so a member can never cancel anyone else.
        Gated by a restraint: they must hold no active (admin-confirmed,
        not-cancelled, not-expired) subscriptions — those have to be wound down
        first. (The office can force-cancel via ``MemberViewSet.cancel``, which
        cascades and ends the subscriptions instead of refusing.) On success it
        cascades to the member's coop shares exactly like the office path
        (``cancel_member_with_coop_shares`` snapshots each share's ``payback_due_date``).
      tags:
      - commissioning
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                effective_at:
                  type: string
                  format: date
                reason:
                  type: string
              required:
              - effective_at
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyMemberDataRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/commissioning/my_subscriptions/subscribe/:
    post:
      operationId: commissioning_my_subscriptions_subscribe_create
      description: |-
        Member self-service subscription ("Abo") creation.

        The authenticated member subscribes to a share-type variation. The member
        is resolved from ``request.user.member_profile`` (same ownership-link
        convention as :class:`MyMemberDataView`) and forced server-side, so a member
        can NEVER subscribe for another member — any ``member`` in the request body
        is ignored. ``is_trial`` is forced False and ``price_per_delivery`` is
        derived from the chosen variation; the member sets only the variation,
        quantity, payment cycle, delivery station+day and start (+ optional end)
        date. The subscription is created as a DRAFT (``admin_confirmed=False``,
        reusing the office ``create_bare_subscription`` path, which reserves its
        station-day capacity); the office confirms it through the existing abo
        confirmation flow, which materialises the deliveries.
      tags:
      - commissioning
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MySubscriptionSubscribe'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MySubscriptionSubscribe'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MySubscriptionSubscribe'
        required: true
      security:
      - tenantBoundJwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/commissioning/offer_groups/:
    get:
      operationId: commissioning_offer_groups_list
      description: |-
        ViewSet mixin that maps DRF actions to permission classes.

        Usage:
            class InvoiceViewSet(RolePermissionsMixin, viewsets.ModelViewSet):
                read_permission = IsStaff
                write_permission = IsOffice

        Read actions (`list`, `retrieve`) require `read_permission`; everything
        else (create / update / partial_update / destroy / custom @action) requires
        `write_permission`. Both default to `IsAuthenticated`. Any classes set on
        the parent (via `permission_classes`) are layered on top.

        Public actions:
            Set ``public_read_actions`` to a set of action names that should be
            accessible to *anyone* (anonymous + authenticated, no role check).
            Use for endpoints that serve content the public needs before login —
            the registration wizard fetching ``ConsentDocument`` text is the
            canonical case. The set may include ``"list"`` / ``"retrieve"`` and
            custom ``@action`` names alike; entries here override
            ``read_permission`` / ``write_permission`` for that action only.

            class ConsentDocumentViewSet(RolePermissionsMixin, ModelViewSet):
                write_permission = IsOffice          # publishing a new version
                public_read_actions = {"list", "retrieve", "current"}
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OfferGroup'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
