  /api/commissioning/share_type_variation_amounts_for_planning/:
    get:
      operationId: commissioning_share_type_variation_amounts_for_planning_retrieve
      description: "\n        Get comprehensive planning data for all variations,
        days, tours, and stations\n        for a given week. Returns a dictionary
        with keys for different planning modes:\n        \n        - **Basic mode**:
        `day_{day_id}_variation_{variation_id}`\n        - **Tour mode**: `day_{day_id}_variation_{variation_id}_tour_{tour_number}`\n
        \       - **Station mode**: `day_{day_id}_variation_{variation_id}_station_{station_id}`\n
        \       \n        Use this endpoint to get a complete overview for weekly
        planning across all\n        delivery scenarios.\n        "
      summary: Get all share variation amounts for planning
      parameters:
      - in: query
        name: delivery_week
        schema:
          type: integer
        description: ISO week number (1-53)
        required: true
        examples:
          Week1:
            value: 1
            summary: Week 1
          Week26:
            value: 26
            summary: Week 26
          Week52:
            value: 52
            summary: Week 52
      - in: query
        name: share_option
        schema:
          type: string
          enum:
          - BREAD_SHARE
          - CHICKEN_SHARE
          - GRAIN_SHARE
          - HARVEST_SHARE
          - HARVEST_SHARE_FRUIT
          - HONEY_SHARE
          - OIL_SHARE
        description: Share option (e.g. GEMUESE, OBST)
        required: true
      - in: query
        name: year
        schema:
          type: integer
        description: Year (YYYY format)
        required: true
        examples:
          '2024':
            value: 2024
          '2025':
            value: 2025
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
                  description: Variation count for this key combination
                example:
                  day_monday-id_variation_small-id: 15
                  day_monday-id_variation_small-id_tour_1: 10
                  day_monday-id_variation_small-id_tour_2: 5
                  day_monday-id_variation_small-id_station_downtown: 8
                  day_monday-id_variation_large-id: 8
          description: Planning data with variation counts for all combinations
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
