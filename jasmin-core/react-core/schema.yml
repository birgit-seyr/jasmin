  /api/commissioning/purchase/:
    get:
      operationId: commissioning_purchase_list
      description: |-
        ``perform_destroy`` that re-cascades stock snapshots after deleting a
        movement-source row (Harvest/Purchase/Waste).

        Deleting the row cascade-deletes its ``MovementShareArticle`` (the source FK
        is ``on_delete=CASCADE``); the plain DRF destroy never recomputes, so capture
        the movement BEFORE the delete and re-cascade the affected entity. Mirrors
        ``ForecastViewSet.perform_destroy`` — but no ``recalculate_actual_corrections``
        is needed because the deleted movement IS the actual correction.
      parameters:
      - in: query
        name: is_past
        schema:
          type: boolean
          default: false
        description: When true, includes archived/historical data. When false (default),
          only recent data is returned.
      - name: limit
        required: false
        in: query
        description: Anzahl der pro Seite zurückzugebenden Ergebnisse.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: Der initiale Index, von dem die Ergebnisse zurückgegeben werden
          sollen.
        schema:
          type: integer
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPurchaseList'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
    post:
      operationId: commissioning_purchase_create
      description: Create a purchase with related objects and return its summary.
      tags:
      - commissioning
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Purchase'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Purchase'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Purchase'
        required: true
      security:
      - tenantBoundJwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentationSummaryRow'
          description: 'The freshly written row echoed in documentation-summary shape
            (see the summary action). May be ``{}`` when the row no longer matches
            the summary filters. Note: two seeded harvest storages add dynamic ``storage_<id>``
            boolean keys not listed here.'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
