  /api/commissioning/granularity/:
    get:
      operationId: commissioning_granularity_retrieve
      description: "\n        Check if ShareContent data for a given year and week
        supports:\n        - Day-level granularity (same amounts per day)\n        -
        Tour-level granularity (same amounts per tour)\n        \n        Returns:\n
        \       - days_ok: true if all items have same amount per day\n        - tours_ok:
        true if all items have same amount per tour\n        "
      summary: Check ShareContent Granularity
      parameters:
      - in: query
        name: day_number
        schema:
          type: integer
        description: Day of the week (0=Monday, 6=Sunday)
        examples:
          Monday:
            value: 0
          Wednesday:
            value: 2
          Sunday:
            value: 6
      - in: query
        name: delivery_week
        schema:
          type: integer
        description: ISO week number (1-53)
        required: true
        examples:
          Week1:
            value: 1
            summary: Week 1
          Week26:
            value: 26
            summary: Week 26
          Week52:
            value: 52
            summary: Week 52
      - in: query
        name: share_option
        schema:
          type: string
          enum:
          - BREAD_SHARE
          - CHICKEN_SHARE
          - GRAIN_SHARE
          - HARVEST_SHARE
          - HARVEST_SHARE_FRUIT
          - HONEY_SHARE
          - OIL_SHARE
        description: Share option (e.g. GEMUESE, OBST)
      - in: query
        name: year
        schema:
          type: integer
        description: Year (YYYY format)
        required: true
        examples:
          '2024':
            value: 2024
          '2025':
            value: 2025
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GranularityCheckResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/commissioning/harvest/:
    get:
      operationId: commissioning_harvest_list
      description: |-
        ``perform_destroy`` that re-cascades stock snapshots after deleting a
        movement-source row (Harvest/Purchase/Waste).

        Deleting the row cascade-deletes its ``MovementShareArticle`` (the source FK
        is ``on_delete=CASCADE``); the plain DRF destroy never recomputes, so capture
        the movement BEFORE the delete and re-cascade the affected entity. Mirrors
        ``ForecastViewSet.perform_destroy`` — but no ``recalculate_actual_corrections``
        is needed because the deleted movement IS the actual correction.
      parameters:
      - in: query
        name: is_past
        schema:
          type: boolean
          default: false
        description: When true, includes archived/historical data. When false (default),
          only recent data is returned.
      - name: limit
        required: false
        in: query
        description: Anzahl der pro Seite zurückzugebenden Ergebnisse.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: Der initiale Index, von dem die Ergebnisse zurückgegeben werden
          sollen.
        schema:
          type: integer
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedHarvestList'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
    post:
      operationId: commissioning_harvest_create
      description: Create a harvest with related objects and return its summary.
      tags:
      - commissioning
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Harvest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Harvest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Harvest'
        required: true
      security:
      - tenantBoundJwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentationSummaryRow'
          description: 'The freshly written row echoed in documentation-summary shape
            (see the summary action). May be ``{}`` when the row no longer matches
            the summary filters. Note: two seeded harvest storages add dynamic ``storage_<id>``
            boolean keys not listed here.'
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
