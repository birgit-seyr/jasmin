  /api/commissioning/waste/:
    get:
      operationId: commissioning_waste_list
      description: |-
        ``perform_destroy`` that re-cascades stock snapshots after deleting a
        movement-source row (Harvest/Purchase/Waste).

        Deleting the row cascade-deletes its ``MovementShareArticle`` (the source FK
        is ``on_delete=CASCADE``); the plain DRF destroy never recomputes, so capture
        the movement BEFORE the delete and re-cascade the affected entity. Mirrors
        ``ForecastViewSet.perform_destroy`` — but no ``recalculate_actual_corrections``
        is needed because the deleted movement IS the actual correction.
      parameters:
      - in: query
        name: day_number
        schema:
          type: integer
        description: Day of the week (0=Monday, 6=Sunday)
        required: true
        examples:
          Monday:
            value: 0
          Wednesday:
            value: 2
          Sunday:
            value: 6
      - in: query
        name: delivery_week
        schema:
          type: integer
        description: ISO week number (1-53)
        required: true
        examples:
          Week1:
            value: 1
            summary: Week 1
          Week26:
            value: 26
            summary: Week 26
          Week52:
            value: 52
            summary: Week 52
      - in: query
        name: is_past
        schema:
          type: boolean
          default: false
        description: When true, includes archived/historical data. When false (default),
          only recent data is returned.
      - name: limit
        required: false
        in: query
        description: Anzahl der pro Seite zurückzugebenden Ergebnisse.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: Der initiale Index, von dem die Ergebnisse zurückgegeben werden
          sollen.
        schema:
          type: integer
      - in: query
        name: year
        schema:
          type: integer
        description: Year (YYYY format)
        required: true
        examples:
          '2024':
            value: 2024
          '2025':
            value: 2025
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWasteList'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
    post:
      operationId: commissioning_waste_create
      description: Create a waste record with related objects.
      tags:
      - commissioning
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Waste'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Waste'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Waste'
        required: true
      security:
      - tenantBoundJwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Waste'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '403':
