          type: string
        description: sharesdeliveryday ID (Jasmin ID format)
        required: true
      - in: query
        name: delivery_station
        schema:
          type: string
        description: Delivery station ID (Jasmin ID format)
      - in: query
        name: delivery_week
        schema:
          type: integer
        description: ISO week number (1-53)
        required: true
        examples:
          Week1:
            value: 1
            summary: Week 1
          Week26:
            value: 26
            summary: Week 26
          Week52:
            value: 52
            summary: Week 52
      - in: query
        name: physical_share_type_variations
        schema:
          type: boolean
        description: If true, return physical share_type_variation totals resolving
          virtual subscriptions into their physical components.
      - in: query
        name: share_option
        schema:
          type: string
          enum:
