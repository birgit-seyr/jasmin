  /api/commissioning/current_stock_comparison/:
    get:
      operationId: commissioning_current_stock_comparison_list
      description: "\n        Compare theoretical stock (calculated from movements)
        with actual stock (from CurrentStock entries).\n        Filters out entries
        where both theoretical and actual stock are zero/null.\n        "
      summary: Get current stock comparison
      parameters:
      - in: query
        name: day_number
        schema:
          type: integer
        description: Day of the week (0=Monday, 6=Sunday)
        required: true
        examples:
          Monday:
            value: 0
          Wednesday:
            value: 2
          Sunday:
            value: 6
      - in: query
        name: delivery_week
        schema:
          type: integer
        description: ISO week number (1-53)
        required: true
        examples:
          Week1:
            value: 1
            summary: Week 1
          Week26:
            value: 26
            summary: Week 26
          Week52:
            value: 52
            summary: Week 52
