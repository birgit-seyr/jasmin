    ConsentDocument:
      type: object
      description: |-
        Read-and-write serializer for ConsentDocument.

        ``body_sha256`` is computed in ``Model.save()`` — never set from
        the wire — so it's marked read-only here. ``valid_until`` is set
        automatically by ``TimeBoundMixin.handle_succession`` when a
        successor is published; we keep it on the wire so the admin UI
        can show "this version was retired on …", but it's read-only.

        ``can_be_deleted`` is injected by ``DeletableMixin`` and answers
        "is any ConsentRecord pointing at this document?" — False once
        any member has consented, True otherwise. The frontend hides the
        delete button when False; the FK's ``on_delete=PROTECT`` enforces
        the same at the DB layer.

        We DO NOT use ``fields = "__all__"`` here on purpose — see the
        module docstring of this file. The explicit list means adding
        a new column to the model never silently widens the public API.
      properties:
        id:
          type: string
          readOnly: true
        kind:
          $ref: '#/components/schemas/ConsentKindEnum'
        version:
          type: string
          description: Stable identifier. ISO date like '2026-05-20' or semver-style
            '3.1' both work; pick one convention per tenant.
          maxLength: 40
        locale:
          type: string
          default: de
          maxLength: 10
        title:
          type: string
          maxLength: 200
        valid_from:
          type: string
          format: date
        valid_until:
          type: string
          format: date
          readOnly: true
          nullable: true
        body:
          type: string
          description: Verbatim text shown to the member. Markdown or HTML depending
            on tenant convention — store it as-shown.
        body_sha256:
          type: string
          readOnly: true
          description: Computed on save. Lets us detect post-hoc edits to ``body``
            even though by policy they shouldn't happen.
        created_at:
          type: string
          format: date-time
          readOnly: true
        can_be_deleted:
          type: boolean
          readOnly: true
      required:
      - body
      - kind
      - valid_from
      - version
    ConsentDocumentSummary:
      type: object
      description: |-
        Thin variant for embedding inside ConsentRecord — omits the full
        body to keep list payloads bounded.
      properties:
        id:
          type: string
          readOnly: true
        kind:
          allOf:
          - $ref: '#/components/schemas/ConsentKindEnum'
          readOnly: true
        version:
          type: string
          readOnly: true
          description: Stable identifier. ISO date like '2026-05-20' or semver-style
            '3.1' both work; pick one convention per tenant.
        locale:
          type: string
          readOnly: true
          default: de
        title:
          type: string
          readOnly: true
        valid_from:
          type: string
          format: date
          readOnly: true
    ConsentKindEnum:
      enum:
      - privacy
      - sepa
      - withdrawal
      - terms
      - coop_contract
      type: string
      description: |-
        * `privacy` - Privacy policy
        * `sepa` - SEPA Direct Debit mandate
        * `withdrawal` - Withdrawal terms
        * `terms` - Terms of service
        * `coop_contract` - Cooperative-share subscription contract
    ConsentRecord:
      type: object
      description: |-
        Read serializer — full document summary embedded so the UI can
        render "you agreed to <title> v<version> on <date>" without a
        second round-trip.
      properties:
        id:
          type: string
          readOnly: true
        member:
          type: string
          readOnly: true
        document:
