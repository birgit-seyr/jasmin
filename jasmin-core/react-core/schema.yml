  /api/commissioning/historical_share_type_variation_averages/:
    get:
      operationId: commissioning_historical_share_type_variation_averages_retrieve
      description: "\n    Calculate historical averages for share variation amounts
        based on past years' data.\n    Useful for predicting future share contents
        based on historical patterns.\n    "
      summary: Get historical share variation averages
      parameters:
      - in: query
        name: active_at_date
        schema:
          type: string
          format: date
        description: 'When using `share_option`: only consider variations active at
          this date. Ignored if `share_type_variation_ids` given.'
      - in: query
        name: delivery_week
        schema:
          type: integer
        description: ISO week number (1-53)
        required: true
        examples:
          Week1:
            value: 1
            summary: Week 1
          Week26:
            value: 26
            summary: Week 26
          Week52:
            value: 52
            summary: Week 52
      - in: query
        name: share_option
        schema:
          type: string
        description: Resolve variation IDs server-side from share_option (e.g. 'gemuese').
          Use this to avoid a client-side waterfall.
      - in: query
        name: share_type_variation_ids
        schema:
          type: string
        description: Comma-separated list of share type variation IDs. Pass this OR
          `share_option` (+ optional `active_at_date`).
        examples:
          MultipleVariations:
            value: var-123,var-456,var-789
            summary: Multiple Variations
      - in: query
        name: year
        schema:
          type: integer
        description: Year (YYYY format)
        required: true
        examples:
          '2024':
            value: 2024
          '2025':
            value: 2025
      - in: query
        name: years_back
        schema:
          type: integer
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: number
          description: Flat map of 'day_<id>_variation_<id>[...]' keys to average
            amounts.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/commissioning/invoice_contents/:
    get:
      operationId: commissioning_invoice_contents_list
      description: |-
        ViewSet mixin that maps DRF actions to permission classes.

        Usage:
            class InvoiceViewSet(RolePermissionsMixin, viewsets.ModelViewSet):
                read_permission = IsStaff
                write_permission = IsOffice

        Read actions (`list`, `retrieve`) require `read_permission`; everything
        else (create / update / partial_update / destroy / custom @action) requires
        `write_permission`. Both default to `IsAuthenticated`. Any classes set on
        the parent (via `permission_classes`) are layered on top.

        Public actions:
            Set ``public_read_actions`` to a set of action names that should be
            accessible to *anyone* (anonymous + authenticated, no role check).
            Use for endpoints that serve content the public needs before login —
            the registration wizard fetching ``ConsentDocument`` text is the
            canonical case. The set may include ``"list"`` / ``"retrieve"`` and
            custom ``@action`` names alike; entries here override
            ``read_permission`` / ``write_permission`` for that action only.

            class ConsentDocumentViewSet(RolePermissionsMixin, ModelViewSet):
                write_permission = IsOffice          # publishing a new version
                public_read_actions = {"list", "retrieve", "current"}
      parameters:
      - in: query
        name: invoice_id
        schema:
          type: string
        description: Invoice ID (Jasmin ID format)
        required: true
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InvoiceResellerContent'
          description: ''
        '401':
          content:
            application/json:
              schema:
