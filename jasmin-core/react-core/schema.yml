openapi: 3.0.3
info:
  title: Jasmin Platform API
  version: 1.0.0
  description: CSA Management Platform API
paths:
  /api/auth/{user_id}/:
    patch:
      operationId: auth_partial_update
      summary: Update user profile
      parameters:
      - in: path
        name: user_id
        schema:
          type: string
        required: true
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/auth/admin/users/:
    get:
      operationId: auth_admin_users_list
      description: |-
        Admin endpoints for managing tenant users.

        All operations require the ``admin`` role. Wired into ``/admin/users/``
        by ``apps.accounts.urls`` via ``DefaultRouter``.
      summary: List tenant users (admin)
      tags:
      - auth
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminUserRow'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
    post:
      operationId: auth_admin_users_create
      description: |-
        Admin endpoints for managing tenant users.

        All operations require the ``admin`` role. Wired into ``/admin/users/``
        by ``apps.accounts.urls`` via ``DefaultRouter``.
      summary: Create a tenant user and send invitation email (admin)
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminUserCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminUserCreateRequest'
        required: true
      security:
      - tenantBoundJwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserRow'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/auth/admin/users/{id}/:
    patch:
      operationId: auth_admin_users_partial_update
      description: |-
        Admin endpoints for managing tenant users.

        All operations require the ``admin`` role. Wired into ``/admin/users/``
        by ``apps.accounts.urls`` via ``DefaultRouter``.
      summary: Update a tenant user (admin)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminUserUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminUserUpdateRequest'
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserRow'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/auth/admin/users/{id}/resend-invitation/:
    post:
      operationId: auth_admin_users_resend_invitation_create
      description: |-
        Admin endpoints for managing tenant users.

        All operations require the ``admin`` role. Wired into ``/admin/users/``
        by ``apps.accounts.urls`` via ``DefaultRouter``.
      summary: Re-send invitation email to a user still in pending_invitation
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - auth
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserRow'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/auth/invitations/{token}/:
    get:
      operationId: auth_invitations_retrieve
      summary: 'Pre-flight: verify an invitation token'
      parameters:
      - in: path
        name: token
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - auth
      security:
      - tenantBoundJwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationVerifyResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/auth/invitations/accept/:
    post:
      operationId: auth_invitations_accept_create
      summary: 'Accept an invitation: set password and activate the account'
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
        required: true
      security:
      - tenantBoundJwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/auth/login/:
    post:
      operationId: auth_login_create
      summary: User login
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginOrChallengeResponse'
          description: 'Two response shapes share status 200: full ``LoginResponse``
            when 2FA is OFF or unconfigured, and ``TwoFactorChallengeResponse`` ({requires_2fa:
            true, challenge_token}) when the user has an active TOTP device. Frontend
            must branch on ``requires_2fa``.'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      summary: User logout
      tags:
      - auth
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/auth/logout-all/:
    post:
      operationId: auth_logout_all_create
      description: Revokes every refresh token for the authenticated user — this browser
        and every other device/session. Use after a suspected compromise. Already-issued
        access tokens keep working until they expire (short-lived); no new session
        can be minted from an old refresh token.
      summary: Log out of all sessions (this device and every other)
      tags:
      - auth
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/auth/password-reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      summary: Confirm a password reset
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/auth/password-reset/request/:
    post:
      operationId: auth_password_reset_request_create
      description: Sends a single-use, time-limited reset link to the address if it
        matches an active account. Always returns 200 to prevent user-enumeration.
      summary: Request a password-reset email
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      summary: Refresh JWT access token
      tags:
      - auth
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: Final step of the public registration wizard. Requires the email
        to have been verified first (``register/verify_code/``). Creates a JasminUser
        WITHOUT a usable password plus a Member row (``admin_confirmed=False``) and
        emails an ``accounts.invitation`` set-password link. Office confirms the member
        separately.
      summary: Public self-registration with membership application
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicRegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PublicRegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PublicRegisterRequest'
        required: true
      security:
      - tenantBoundJwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicRegisterResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/auth/register/send_code/:
    post:
      operationId: auth_register_send_code_create
      description: 'Step ''confirm email'' of the public registration wizard: emails
        a short numeric code to prove the applicant controls the address. Always returns
        the same generic body (anti-enumeration); a code is only actually sent when
        the address isn''t already an account.'
      summary: Request a registration email-verification code
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterSendCodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterSendCodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterSendCodeRequest'
        required: true
      security:
      - tenantBoundJwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterSendCodeResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/auth/register/verify_code/:
    post:
      operationId: auth_register_verify_code_create
      summary: Verify a registration email-verification code
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterVerifyCodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterVerifyCodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterVerifyCodeRequest'
        required: true
      security:
      - tenantBoundJwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterVerifyCodeResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/auth/step-up/:
    post:
      operationId: auth_step_up_create
      description: Re-verifies the caller's password (and TOTP code when ``STEP_UP_REQUIRES_TOTP``
        is on) and returns a new access token carrying ``step_up_verified_at``. The
        frontend swaps the access token in and retries the original destructive request.
        The new token's TTL for step-up purposes is ``STEP_UP_TTL_SECONDS`` (default
        300); the JWT itself still expires at the normal access-token lifetime.
      summary: Step-up authentication — issue a fresh access token for sudo mode
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StepUpRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StepUpRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StepUpRequest'
        required: true
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StepUpResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/auth/two-factor/disable/:
    post:
      operationId: auth_two_factor_disable_create
      summary: Disable 2FA (requires a current TOTP or recovery code)
      tags:
      - Auth — Two-factor
      requestBody:
