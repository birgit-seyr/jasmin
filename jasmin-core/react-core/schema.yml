    Subscription:
      type: object
      description: |-
        Read/write serializer for `Subscription`.

        The read-only ``*_name`` / ``member_*`` fields used to come from
        `.annotate()` calls in the viewset queryset; they're now resolved
        via DRF ``source=`` and ``SerializerMethodField`` so the viewset
        queryset stays lean. Callers must keep the matching ``select_related``
        chain (see ``_build_subscription_queryset``) to avoid N+1.
      properties:
        id:
          type: string
          readOnly: true
        display_id:
          type: string
          description: Get human-readable display ID
          readOnly: true
        renewal_display_id:
          type: string
          readOnly: true
        member:
          type: string
        share_type_variation:
          type: string
        member_first_name:
          type: string
          readOnly: true
        member_last_name:
          type: string
          readOnly: true
        member_string:
          type: string
          readOnly: true
        email:
          type: string
          readOnly: true
        pickup_name:
          type: string
          readOnly: true
          nullable: true
        member_cancelled_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        share_type_variation_string:
          type: string
          readOnly: true
        share_type_name:
          type: string
          readOnly: true
        share_type_variation_size:
          type: string
          readOnly: true
        delivery_cycle:
          type: string
          readOnly: true
          nullable: true
        requires_optin:
          type: boolean
          readOnly: true
        payment_cycle_name:
          type: string
          readOnly: true
        delivery_day_number:
          type: integer
          readOnly: true
          nullable: true
        delivery_station_name:
          type: string
          readOnly: true
          nullable: true
        cancellation_reason:
          type: string
          readOnly: true
          nullable: true
        is_trial:
          type: boolean
        quantity:
          type: integer
        price_per_delivery:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
        notice_period_duration:
          type: integer
          readOnly: true
          nullable: true
        valid_from:
          type: string
          format: date
        valid_until:
          type: string
          format: date
          nullable: true
        can_be_deleted:
          type: boolean
          readOnly: true
        deliveries_count:
          type: integer
          readOnly: true
        jokers_taken:
          type: integer
          readOnly: true
        amount_of_jokers:
          type: integer
          readOnly: true
        donation_jokers_taken:
          type: integer
          readOnly: true
        amount_of_donation_jokers:
          type: integer
          readOnly: true
        automatically_renewed_at:
          type: string
          nullable: true
          description: |-
            Cancellation deadline = valid_until - N weeks. None when blank.

            The frontend used to compute this per-row per-render via dayjs;
            moving it server-side cuts the render cost on Abos.tsx and
            centralises the "when does this column light up" rule.

            Skip cases (return None):
              * ``is_trial`` — trial subs don't auto-renew (see TrialPolicy).
              * No ``valid_until`` — open-ended subs have no deadline.
              * The deadline would fall before ``valid_from`` — short terms
                (4-week trials, half-season subs) shouldn't surface a
                deadline that pre-dates the subscription itself.
            Pass-through cases:
              * ``min_weeks_to_cancel_before_ending`` unset / 0 → return
                ``valid_until`` itself; the column means "you must cancel
                before this date" and a 0-week window collapses to
                valid_until.
          readOnly: true
        admin_confirmed:
          type: boolean
          readOnly: true
        admin_confirmed_at:
          type: string
          format: date-time
