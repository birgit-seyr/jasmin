  /api/commissioning/members/{id}/cancel/:
    post:
      operationId: commissioning_members_cancel_create
      description: 'Office-cancel a membership effective on the given date (``effective_at``,
        YYYY-MM-DD; the legal GenG exit date). Cascades to the member''s coop shares
        (cancelled + payback_due_date snapshotted = effective + retention). By default
        the cancellation is REFUSED (409) while the member still holds active subscriptions
        — end those first. Pass ``force=true`` to cancel anyway: the active subscriptions
        are then ended in the same transaction (term truncated, future deliveries
        dropped, charges re-planned). The response lists any subscription that could
        NOT be ended (it keeps a live mandate and needs manual attention).'
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: Ein eindeutiger Wert, der member identifiziert.
        required: true
      tags:
      - commissioning
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                effective_at:
                  type: string
                  format: date
                reason:
                  type: string
                force:
                  type: boolean
                  default: false
              required:
              - effective_at
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberCancelResult'
          description: ''
        '400':
