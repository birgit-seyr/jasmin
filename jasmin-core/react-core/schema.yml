            class ConsentDocumentViewSet(RolePermissionsMixin, ModelViewSet):
                write_permission = IsOffice          # publishing a new version
                public_read_actions = {"list", "retrieve", "current"}
      parameters:
      - in: query
        name: active_at_date
        schema:
          type: string
          format: date
        description: Filter for records active at the given date (YYYY-MM-DD)
      - in: query
        name: delivery_week
        schema:
          type: integer
        description: ISO week number (1-53)
        examples:
          Week1:
            value: 1
            summary: Week 1
          Week26:
            value: 26
            summary: Week 26
          Week52:
            value: 52
            summary: Week 52
      - in: query
        name: include_future
        schema:
          type: boolean
        description: Widen the validity filter to current + future variations (active
          on the reference date OR starting after it), excluding only already-ended
          ones. Reference date = active_at_date if given, else today.
      - in: query
        name: is_packed_bulk
        schema:
          type: boolean
        description: Filter by per-variation bulk-packing flag. Only meaningful in
          MIXED packing mode; omit to return all variations.
      - in: query
        name: num_weeks
        schema:
          type: integer
        description: 'Number of weeks of per-variation capacity_by_week to return
          (default: 52). Needs year + delivery_week.'
      - in: query
        name: physical
        schema:
          type: boolean
        description: Filter for physical variations only
      - in: query
        name: share_option
        schema:
          type: string
          enum:
          - BREAD_SHARE
          - CHICKEN_SHARE
          - GRAIN_SHARE
          - HARVEST_SHARE
          - HARVEST_SHARE_FRUIT
          - HONEY_SHARE
          - OIL_SHARE
        description: Share option (e.g. GEMUESE, OBST)
      - in: query
        name: share_type
        schema:
          type: string
        description: Share type ID (Jasmin ID format)
      - in: query
        name: virtual
        schema:
          type: boolean
        description: Filter for virtual variations only
      - in: query
        name: year
        schema:
          type: integer
        description: Year (YYYY format)
        examples:
          '2024':
            value: 2024
          '2025':
            value: 2025
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShareTypeVariation'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
