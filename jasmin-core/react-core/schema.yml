  /api/commissioning/members/:
    get:
      operationId: commissioning_members_list
      description: |-
        Mount in front of ``RolePermissionsMixin`` on viewsets serving
        PII-bearing models (Member, BillingProfile, Reseller, …).

        The ``super().retrieve(...)`` call dispatches through the rest of
        the MRO (permission check + ModelViewSet.retrieve) — we only
        write the log line if that returned successfully. Failures
        (403 / 404 / 500) propagate unchanged with no ``pii.read`` row
        written, because the actor didn't actually see anything.

        The subject identifier is taken from the URL kwarg (``pk`` by
        default), and the model name from the viewset's ``queryset``.
        Neither requires a custom override per viewset.
      parameters:
      - in: query
        name: exclude_trial_members
        schema:
          type: boolean
        description: Exclude trial members from results
      - in: query
        name: is_active
        schema:
          type: boolean
        description: Filter by active status
      - in: query
        name: is_trial
        schema:
          type: boolean
        description: Filter by trial status (true for trial, false for non-trial)
      - name: limit
        required: false
        in: query
        description: Anzahl der pro Seite zurückzugebenden Ergebnisse.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: Der initiale Index, von dem die Ergebnisse zurückgegeben werden
          sollen.
        schema:
          type: integer
      - in: query
        name: only_with_subscriptions
        schema:
          type: boolean
        description: Only return members that have subscriptions
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMemberList'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
    post:
      operationId: commissioning_members_create
      description: |
        Create a Member. If the supplied email matches an existing JasminUser, the new Member is linked to that user (instead of rejecting with a uniqueness error). The behaviour depends on the user's account status:
          * ``active``              → link, auto-confirm the member, and (if ``notify_user=true``) send a 'you are now a member' email.
          * ``pending_invitation``  → link only; the member is auto-confirmed when the user accepts the invitation.
          * ``pending_approval``    → 409 conflict; the user already has a pending member application.
          * ``inactive``            → 409 conflict.
      tags:
      - commissioning
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MemberCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MemberCreateRequest'
      security:
      - tenantBoundJwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
