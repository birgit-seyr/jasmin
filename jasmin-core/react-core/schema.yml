  /api/commissioning/orders_overview/:
    get:
      operationId: commissioning_orders_overview_list
      description: "\n        Get a comprehensive overview of orders including:\n
        \       - Order details (number, date, status)\n        - Reseller information\n
        \       - Related delivery note (if exists)\n        - Related invoice (if
        exists)\n        - Payment status\n        \n        Results can be filtered
        by year, week, day_number, and reseller.\n        "
      summary: Get Combined Order Overview
      parameters:
      - in: query
        name: day_number
        schema:
          type: integer
        description: Day of the week (0=Monday, 6=Sunday)
        examples:
          Monday:
            value: 0
          Wednesday:
            value: 2
          Sunday:
            value: 6
      - in: query
        name: delivery_week
        schema:
          type: integer
        description: ISO week number (1-53)
        examples:
          Week1:
            value: 1
            summary: Week 1
          Week26:
            value: 26
            summary: Week 26
          Week52:
            value: 52
            summary: Week 52
      - in: query
        name: reseller
        schema:
          type: string
        description: Reseller ID (Jasmin ID format)
      - in: query
        name: year
        schema:
          type: integer
        description: Year (YYYY format)
        examples:
          '2024':
            value: 2024
          '2025':
            value: 2025
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CombinedOrderOverview'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/commissioning/packing_list/:
    get:
      operationId: commissioning_packing_list_list
      description: Get packing list for a given week + delivery day (day_number).
      parameters:
      - in: query
        name: day_number
        schema:
          type: integer
        description: Day of the week (0=Monday, 6=Sunday)
        required: true
        examples:
          Monday:
            value: 0
          Wednesday:
            value: 2
          Sunday:
            value: 6
      - in: query
        name: delivery_station
        schema:
          type: string
        description: Delivery station ID (Jasmin ID format)
      - in: query
        name: delivery_week
        schema:
          type: integer
        description: ISO week number (1-53)
        required: true
        examples:
          Week1:
            value: 1
            summary: Week 1
          Week26:
            value: 26
            summary: Week 26
          Week52:
            value: 52
            summary: Week 52
      - in: query
        name: is_packed_bulk
        schema:
          type: boolean
        description: Restrict to variations with this is_packed_bulk value. Used in
          MIXED packing mode to split the list into boxes (False) and bulk (True).
          Omit to include all.
      - in: query
        name: is_past
        schema:
          type: boolean
          default: false
        description: When true, includes archived/historical data. When false (default),
          only recent data is returned.
      - in: query
        name: packing_station
        schema:
          type: integer
        description: Packing station number
      - in: query
        name: share_type
        schema:
          type: string
        description: Share type ID (Jasmin ID format)
        required: true
      - in: query
        name: tour
        schema:
          type: integer
        description: Tour number
      - in: query
        name: year
        schema:
          type: integer
        description: Year (YYYY format)
        required: true
        examples:
          '2024':
            value: 2024
          '2025':
            value: 2025
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PackingListRow'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/commissioning/packing_list_bulk/:
    get:
      operationId: commissioning_packing_list_bulk_list
      description: Per-delivery-station bulk packing list. For each (delivery_station,
        share_article) returns the total physical amount needed (amount_per_share
        × physical_share_type_variation_count summed across every variation, with
        virtual share_type_variations resolved into their physical components). Pass
        delivery_station to scope the result to a single station; omit it to get rows
        for every station.
      parameters:
      - in: query
        name: day_number
        schema:
          type: integer
        description: Day of the week (0=Monday, 6=Sunday)
        required: true
        examples:
          Monday:
            value: 0
          Wednesday:
            value: 2
          Sunday:
            value: 6
      - in: query
        name: delivery_station
        schema:
          type: string
        description: Delivery station ID (Jasmin ID format)
      - in: query
        name: delivery_week
        schema:
          type: integer
        description: ISO week number (1-53)
        required: true
        examples:
          Week1:
            value: 1
            summary: Week 1
          Week26:
            value: 26
            summary: Week 26
          Week52:
            value: 52
            summary: Week 52
      - in: query
        name: is_packed_bulk
        schema:
          type: boolean
        description: Restrict to variations with this is_packed_bulk value. Used in
          MIXED packing mode to limit the bulk list to variations actually packed
          in bulk. Omit to include all.
      - in: query
        name: is_past
        schema:
          type: boolean
          default: false
        description: When true, includes archived/historical data. When false (default),
          only recent data is returned.
      - in: query
        name: share_type
        schema:
          type: string
        description: Share type ID (Jasmin ID format)
        required: true
      - in: query
        name: year
        schema:
          type: integer
        description: Year (YYYY format)
        required: true
        examples:
          '2024':
            value: 2024
          '2025':
            value: 2025
      tags:
      - commissioning
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PackingListBulkRow'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
