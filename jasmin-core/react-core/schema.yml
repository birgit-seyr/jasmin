          nullable: true
          maxLength: 1
        source_price_per_unit:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
        source_rabatt:
          type: integer
          maximum: 100
          minimum: 0
          nullable: true
        is_finalized:
          type: boolean
          readOnly: true
        finalized_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        amount:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        price_per_unit:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          nullable: true
        rabatt:
          type: integer
          maximum: 100
          minimum: 0
          nullable: true
        tax_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        note:
          type: string
          nullable: true
          maxLength: 500
        finalized_by:
          type: string
          readOnly: true
          nullable: true
        invoice:
          type: string
          nullable: true
        crate_type:
          type: string
        crate_delivery_note_contents:
          type: array
          items:
            type: string
        line_netto:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        line_brutto:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        crate_type_name:
