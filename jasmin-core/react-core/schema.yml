  /api/commissioning/resellers/:
    get:
      operationId: commissioning_resellers_list
      description: |-
        Mount in front of ``RolePermissionsMixin`` on viewsets serving
        PII-bearing models (Member, BillingProfile, Reseller, …).

        The ``super().retrieve(...)`` call dispatches through the rest of
        the MRO (permission check + ModelViewSet.retrieve) — we only
        write the log line if that returned successfully. Failures
        (403 / 404 / 500) propagate unchanged with no ``pii.read`` row
        written, because the actor didn't actually see anything.

        The subject identifier is taken from the URL kwarg (``pk`` by
        default), and the model name from the viewset's ``queryset``.
        Neither requires a custom override per viewset.
      parameters:
      - in: query
        name: delivery_day
        schema:
          type: string
        description: sharesdeliveryday ID (Jasmin ID format)
      - in: query
        name: delivery_week
        schema:
          type: integer
        description: ISO week number (1-53)
        examples:
          Week1:
            value: 1
            summary: Week 1
          Week26:
            value: 26
            summary: Week 26
          Week52:
            value: 52
            summary: Week 52
      - in: query
        name: is_active_donation_recipient
        schema:
          type: boolean
        description: Filter by active donation recipient status
      - in: query
        name: is_active_reseller
        schema:
          type: boolean
        description: Filter by active reseller status
      - in: query
        name: is_active_seller
        schema:
          type: boolean
        description: Filter by active seller status
      - in: query
        name: is_active_supplier
        schema:
          type: boolean
        description: Filter by active supplier status
      - in: query
