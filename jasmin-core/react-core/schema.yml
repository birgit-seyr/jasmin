components:
  schemas:
    AccountStatusEnum:
      enum:
      - active
      - inactive
      type: string
      description: |-
        * `active` - active
        * `inactive` - inactive
    ActiveShareOptions:
      type: object
      properties:
        HARVEST_SHARE:
          type: boolean
        HARVEST_SHARE_FRUIT:
          type: boolean
        CHICKEN_SHARE:
          type: boolean
        HONEY_SHARE:
          type: boolean
        OIL_SHARE:
          type: boolean
        GRAIN_SHARE:
          type: boolean
        BREAD_SHARE:
          type: boolean
        fruit_and_veg_shares_are_separate:
          type: boolean
      required:
      - BREAD_SHARE
      - CHICKEN_SHARE
      - GRAIN_SHARE
      - HARVEST_SHARE
      - HARVEST_SHARE_FRUIT
      - HONEY_SHARE
      - OIL_SHARE
      - fruit_and_veg_shares_are_separate
    AdminDecidedDeletion:
      type: object
      description: |-
        One decided-deletion row (REJECTED / EXECUTED / CANCELLED /
        EXPIRED). The list endpoint paginates via
        ``OptionalLimitOffsetPagination`` so this is the row schema; the
        paginator wraps in ``{count, results}`` at runtime.
      properties:
        id:
          type: string
        state:
          type: string
        requested_email:
          type: string
          format: email
        requested_at:
          type: string
          format: date-time
        decided_at:
          type: string
          format: date-time
          nullable: true
        decided_by_email:
          type: string
          format: email
          nullable: true
        rejection_reason:
          type: string
          nullable: true
      required:
      - decided_at
      - decided_by_email
      - id
      - rejection_reason
      - requested_at
      - requested_email
      - state
    AdminPendingDeletion:
      type: object
      description: One pending-deletion row for the admin inbox.
      properties:
        id:
          type: string
        requested_email:
          type: string
          format: email
        requested_at:
          type: string
          format: date-time
        email_confirmed_at:
          type: string
          format: date-time
          nullable: true
        current_user_email:
          type: string
          format: email
          nullable: true
        blockers:
          type: array
          items:
            type: string
      required:
      - blockers
      - current_user_email
      - email_confirmed_at
      - id
      - requested_at
      - requested_email
    AdminPendingDeletionList:
      type: object
      description: |-
        Envelope for ``gdpr_admin_pending_deletions_view``. Kept as
        ``{pending: [...]}`` (not a bare list) for symmetry with the
        existing deletion-log endpoint and to leave room for top-level
        metadata later (e.g. ``oldest_requested_at``).
      properties:
        pending:
          type: array
          items:
            $ref: '#/components/schemas/AdminPendingDeletion'
      required:
      - pending
    AdminUserCreateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        roles:
          type: array
          items:
            type: string
        user_language:
          allOf:
          - $ref: '#/components/schemas/UserLanguageEnum'
          nullable: true
        reseller_id:
          type: string
          nullable: true
      required:
      - email
      - first_name
      - last_name
    AdminUserRow:
      type: object
      description: |-
        One row in ``GET /api/auth/admin/users/`` and the response payload of
        create / update / resend-invitation.
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        roles:
          type: array
          items:
            type: string
        user_language:
          type: string
          nullable: true
        account_status:
          type: string
        is_active:
          type: boolean
        date_joined:
          type: string
          format: date-time
          nullable: true
        last_login:
          type: string
          format: date-time
          nullable: true
        activated_at:
          type: string
          format: date-time
          nullable: true
        inactivated_at:
          type: string
          format: date-time
          nullable: true
        invitation_expires_at:
          type: string
          format: date-time
          nullable: true
        is_invitation_expired:
          type: boolean
        reseller_id:
          type: string
          nullable: true
      required:
      - account_status
      - activated_at
      - date_joined
      - email
      - first_name
      - id
      - inactivated_at
      - invitation_expires_at
      - is_active
      - is_invitation_expired
      - last_login
      - last_name
      - reseller_id
      - roles
      - user_language
    AdminUserUpdateRequest:
      type: object
      description: All fields optional — PATCH semantics.
      properties:
        first_name:
          type: string
        last_name:
          type: string
        user_language:
          allOf:
          - $ref: '#/components/schemas/UserLanguageEnum'
          nullable: true
        roles:
          type: array
          items:
            type: string
        account_status:
          $ref: '#/components/schemas/AccountStatusEnum'
        reseller_id:
          type: string
          nullable: true
    BackgroundJob:
      type: object
      description: |-
        Snapshot of a ``BackgroundJob`` row for the polling endpoint.

        Shape is intentionally generic — ``progress`` and ``result`` are
        free-form JSON the task wrote at run-time; the frontend interprets
        them based on ``kind``.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        kind:
          type: string
          readOnly: true
        status:
          type: string
          readOnly: true
        progress:
          readOnly: true
        result:
          readOnly: true
        error:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        completed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
    BackgroundJobEnqueueResponse:
      type: object
      description: |-
        Shape returned by the bulk-send endpoints that enqueue a background
        job — the frontend polls ``GET /api/jobs/{job_id}/`` until status is
        ``done`` or ``failed``. Defined here (not imported from notifications)
        to keep commissioning's one-way isolation; the background-job infra
        itself remains a documented extraction blocker.
      properties:
        job_id:
          type: string
          format: uuid
          readOnly: true
        kind:
          type: string
          readOnly: true
        status:
          type: string
          readOnly: true
    BillingProfile:
      type: object
      description: |-
        Provides ``get_member_string`` for a ``member_string =
        SerializerMethodField()`` — a human-readable ``# <number> - <first> <last>``
        label (name only when the member has no number yet). Subclasses override
        ``_resolve_member(obj)`` (default ``obj.member``); the formatter is shared so
        the label can't drift across the subscription / coop-share / loan rows.
      properties:
        id:
          type: string
          readOnly: true
        member:
          type: string
        member_string:
          type: string
          readOnly: true
        payment_method:
          $ref: '#/components/schemas/PaymentMethodEnum'
        iban:
          type: string
          writeOnly: true
          maxLength: 34
        account_holder:
          type: string
          writeOnly: true
          maxLength: 200
        iban_masked:
          type: string
          readOnly: true
        account_holder_masked:
          type: string
          readOnly: true
        sepa_mandate_reference:
          type: string
          nullable: true
          maxLength: 35
        sepa_mandate_signed_at:
          type: string
          format: date
          nullable: true
        sepa_mandate_first_use_at:
          type: string
          format: date
          readOnly: true
          nullable: true
          description: Set when first SEPA debit is exported. Drives FRST→RCUR.
        sepa_mandate_paper_received_at:
          type: string
          format: date
          nullable: true
        is_active:
          type: boolean
        notes:
          type: string
        is_sepa_ready:
          type: boolean
          readOnly: true
      required:
      - member
    BillingRun:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          type: string
          readOnly: true
          nullable: true
        period_start:
          type: string
          format: date
          description: Charges with due_date in [period_start, period_end] are eligible.
        period_end:
          type: string
          format: date
        collection_date:
          type: string
          format: date
          description: Requested execution date sent to the bank (RequestedCollectionDate).
        payment_method:
          $ref: '#/components/schemas/PaymentMethodEnum'
        status:
          allOf:
          - $ref: '#/components/schemas/BillingRunStatusEnum'
          readOnly: true
        total_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        charge_count:
          type: integer
          readOnly: true
        msg_id:
          type: string
          readOnly: true
        sepa_xml_export_url:
          type: string
          nullable: true
          readOnly: true
        notes:
          type: string
      required:
      - collection_date
      - period_end
      - period_start
    BillingRunStatusEnum:
      enum:
      - DRAFT
      - EXPORTED
      - SETTLED
      type: string
      description: |-
        * `DRAFT` - Draft
        * `EXPORTED` - Exported
        * `SETTLED` - Settled
    BillingStrategyEnum:
      enum:
      - EXACT_PER_PERIOD
      - SMOOTHED
      type: string
      description: |-
        * `EXACT_PER_PERIOD` - Exact per period (count actual deliveries)
        * `SMOOTHED` - Smoothed across subscription term
    BulkCopyOffersResponse:
      type: object
      properties:
        total_requested:
          type: integer
        total_copied:
          type: integer
        skipped_count:
          type: integer
        copied_offers:
          type: array
          items:
            type: string
      required:
      - copied_offers
      - skipped_count
      - total_copied
      - total_requested
    BulkCopyOffersToOfferGroupRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: string
          minItems: 1
        year:
          type: integer
        delivery_week:
          type: integer
          maximum: 53
          minimum: 1
        offer_group:
          type: string
      required:
      - delivery_week
      - ids
      - offer_group
      - year
    BulkCreateSummaryInvoiceResponse:
      type: object
      properties:
        invoice_id:
          type: string
        invoice_number:
          type: string
        sum_netto:
          type: string
        sum_brutto:
          type: string
        total_orders_included:
          type: integer
        total_line_items:
          type: integer
        included_orders:
          type: array
          items:
            type: object
            additionalProperties: {}
        success:
          type: boolean
        errors:
          type: array
          items:
            type: object
            additionalProperties: {}
        partial_success:
          type: boolean
      required:
      - included_orders
      - invoice_id
      - invoice_number
      - success
      - sum_brutto
      - sum_netto
      - total_line_items
      - total_orders_included
    BulkDeleteResponse:
      type: object
      description: Response shape for BulkDeleteDocumentsView (built by _build_bulk_response).
      properties:
        model:
          type: string
        total_processed:
          type: integer
        successful:
          type: integer
        failed:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/BulkDeleteResultRow'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/BulkOrderErrorRow'
      required:
      - failed
      - results
      - successful
      - total_processed
    BulkDeleteResultRow:
      type: object
      description: |-
        A per-order success row from BulkDeleteDocumentsView.

        delivery_note path emits order_id/order_number/delivery_note_number; the
        invoice path additionally emits delivery_note_id + invoice_number.
      properties:
        order_id:
          type: string
        order_number:
          type: string
        delivery_note_number:
          type: string
        success:
          type: boolean
        delivery_note_id:
          type: string
        invoice_number:
          type: string
      required:
      - delivery_note_number
      - order_id
      - order_number
      - success
    BulkDocumentRequest:
      type: object
      description: 'Shared request for bulk operations on orders: {ids, model}.'
      properties:
        ids:
          type: array
          items:
            type: string
          minItems: 1
        model:
          $ref: '#/components/schemas/ModelEnum'
      required:
      - ids
      - model
    BulkDocumentResultRow:
      type: object
      description: |-
        A per-order success row from the bulk create-document endpoints.

        The delivery-note path emits order/delivery-note identity; the invoice
        path additionally emits ``invoice_id``/``invoice_number`` (see
        ``_delivery_note_result`` / ``_invoice_result`` in ``reseller_views``).
        Schema-only — the views build the dicts by hand; typing the row here is
        what gives the generated client checked ``invoice_id``/``delivery_note_id``
        reads instead of ``{[key: string]: unknown}``.
      properties:
        order_id:
          type: string
        order_number:
          type: string
        delivery_note_id:
          type: string
        delivery_note_number:
          type: string
        success:
          type: boolean
        invoice_id:
          type: string
        invoice_number:
          type: string
      required:
      - delivery_note_id
      - delivery_note_number
      - order_id
      - order_number
      - success
    BulkDocumentWithDateRequest:
      type: object
      description: Extends BulkDocumentRequestSerializer with an optional date.
      properties:
        ids:
          type: array
          items:
            type: string
          minItems: 1
        model:
