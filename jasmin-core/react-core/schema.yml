          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
        required: true
