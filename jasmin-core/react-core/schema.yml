            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/auth/two-factor/enroll-confirm/:
    post:
      operationId: auth_two_factor_enroll_confirm_create
      summary: Confirm enrolment by submitting the first TOTP code
      tags:
      - Auth — Two-factor
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
        required: true
      security:
      - tenantBoundJwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorRecoveryCodesResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/auth/two-factor/enroll-start/:
    post:
      operationId: auth_two_factor_enroll_start_create
      summary: Begin 2FA enrolment — returns the provisioning URI / QR data
      tags:
      - Auth — Two-factor
      security:
      - tenantBoundJwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorEnrolStartResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Error response.
  /api/auth/two-factor/recovery-codes/regenerate/:
    post:
      operationId: auth_two_factor_recovery_codes_regenerate_create
      summary: Mint a fresh batch of recovery codes (requires TOTP code)
      tags:
      - Auth — Two-factor
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TwoFactorCodeRequest'
        required: true
      security:
      - tenantBoundJwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorRecoveryCodesResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
