# Common security headers for the super-admin HTTPS server block. Stricter
# than the tenant block: X-Frame-Options DENY, Referrer-Policy no-referrer,
# plus X-Robots-Tag to discourage indexing of the admin host.
#
# nginx's ``add_header`` inheritance is ALL-OR-NOTHING per level: a location
# that declares ANY add_header of its own inherits NONE from the server level.
# So this snippet is ``include``d both at the server level AND inside every
# location that sets its own add_header (``/static/``, ``/_protected_media/``).
# max-age matches Django's SECURE_HSTS_SECONDS default (1y) so the two layers
# agree; see the tenant snippet for the preload/ramp caveat.
add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options     "nosniff"        always;
add_header X-Frame-Options            "DENY"           always;
add_header Referrer-Policy            "no-referrer"    always;
add_header Cross-Origin-Opener-Policy "same-origin"    always;
add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
add_header X-Robots-Tag               "noindex, nofollow, nosnippet, noarchive" always;
# Strict CSP (still report-only during initial rollout). See the tenant
# block's snippet for the directive rationale.
add_header Content-Security-Policy-Report-Only
    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; report-uri /api/csp-report/" always;
