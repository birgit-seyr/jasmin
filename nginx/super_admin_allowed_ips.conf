# =============================================================================
# Super-admin IP allowlist
#
# Only IPs listed here can reach https://admin.${FRONTEND_DOMAIN}.
# Tenant subdomains (tenant1.${FRONTEND_DOMAIN}, ...) are NOT affected by
# this file — they remain publicly reachable.
#
# Edit this file with your current IP, then reload nginx (no rebuild needed):
#     docker compose exec gateway nginx -s reload
#
# CAVEAT: this file is bind-mounted into the gateway as a SINGLE FILE, so an
# inode-replacing edit (vim / `sed -i` / `cp`) leaves the container serving the
# stale content even after `nginx -s reload`. After such an edit, run
#     docker compose restart gateway
# instead (or edit in place with `>>`). The durable fix is a directory
# bind-mount.
#
# Find your current IP: https://ifconfig.me/ or `curl -s ifconfig.me`
#
# Examples:
#     allow 203.0.113.42;          # home
#     allow 198.51.100.0/29;       # office /29
#     allow 2001:db8::/64;         # IPv6 prefix
#
# IMPORTANT: leave `deny all;` as the last line.
# =============================================================================

# allow 203.0.113.42;          # <-- replace with your IP

deny all;
