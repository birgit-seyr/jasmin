# Default security headers.
#
# nginx's ``add_header`` inheritance is ALL-OR-NOTHING per level: a location
# that declares ANY add_header of its own inherits NONE from the server level.
# So this snippet is ``include``d at the main (tenant) server level AND inside
# every resource location that sets its own add_header — ``/static/`` and the
# internal ``/_protected_media/`` — in BOTH server blocks. Without that, those
# responses (incl. tenant invoice PDFs with PII served via /_protected_media/)
# would ship with no HSTS / X-Frame-Options / CSP, opening clickjacking of the
# in-tab PDF preview and weakening the host HSTS posture.
#
# X-Frame-Options is SAMEORIGIN (not DENY) so the office's same-origin in-tab
# PDF preview keeps working; CSP frame-ancestors 'none' is the modern control
# (currently Report-Only). The super-admin APP pages use the stricter
# ``security_headers_admin.conf`` at that block's server level instead.
# max-age matches Django's SECURE_HSTS_SECONDS default (1y) so the two layers
# agree. NOTE: ``preload`` is near-permanent — only keep it once HTTPS is proven
# on every subdomain; for a first rollout consider a short ramp (e.g. 3600) and
# adding preload later, mirroring the change in config/settings.py.
add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options     "nosniff"        always;
add_header X-Frame-Options            "SAMEORIGIN"     always;
add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
add_header Cross-Origin-Opener-Policy "same-origin"    always;
add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
# Content Security Policy — REPORT-ONLY for the first rollout. Watch
# /api/csp-report/ logs for a week; once clean, switch the header name to
# `Content-Security-Policy` to enforce. font-src is 'self' + data: only
# (Roboto for PDFs is bundled by Vite). img-src allows data: + https: for QR
# codes / external images. connect-src is 'self' (API + WS are same-origin).
add_header Content-Security-Policy-Report-Only
    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; report-uri /api/csp-report/" always;
